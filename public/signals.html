<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Beacon">
<meta name="theme-color" content="#DFFF00">
<title>Beacon — SchedKit</title>
<link rel="icon" href="/signals-icon.svg" type="image/svg+xml">
<link rel="manifest" href="/signals-manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* Exact same vars as dashboard */
  :root {
    --bg:#0a0a0b;--surface:#111114;--surface2:#16161a;--border:#1e1e24;
    --accent:#DFFF00;--accent-dim:rgba(223,255,0,0.08);--accent-border:rgba(223,255,0,0.2);
    --text:#e8e8ea;--muted:#5a5a6e;--red:#ff5f5f;--green:#4ade80;
    --font-sans:'Space Grotesk',sans-serif;--font-mono:'Fira Code',monospace;
  }
  [data-lights="nite"] {
    --bg:#0d0000;--surface:#130000;--surface2:#1a0000;--border:#2a0000;
    --accent:#ff3300;--accent-dim:rgba(255,51,0,0.08);--accent-border:rgba(255,51,0,0.2);
    --text:#ffaa88;--muted:#662200;--red:#ff4400;--green:#882200;
  }
  [data-lights="nvg"] {
    --bg:#000508;--surface:#010c12;--surface2:#021018;--border:#031820;
    --accent:#4a7a8a;--accent-dim:rgba(74,122,138,0.06);--accent-border:rgba(74,122,138,0.12);
    --text:#4a7a8a;--muted:#1e3a44;--red:#2a5a6a;--green:#2a5a6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    overscroll-behavior: none;
  }

  /* ── NAV ── same style as dashboard top bar */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 700;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .conn-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  .conn-label { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .lights-btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px;
    border-radius: 20px; border: 1px solid var(--accent-border); background: transparent;
    color: var(--muted); font-family: var(--font-mono); font-size: 0.62rem;
    letter-spacing: 0.08em; cursor: pointer;
  }
  .lights-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── BEACON STATUS PANEL — same card style as dashboard ── */
  .beacon-panel {
    margin: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .beacon-panel.active { border-color: var(--accent-border); }
  .beacon-panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .beacon-panel-title {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .beacon-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 100px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .beacon-badge.active {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: var(--accent-border);
    animation: pulse 2s infinite;
  }
  .beacon-badge.paused { background: rgba(255,95,95,0.08); color: var(--red); border-color: rgba(255,95,95,0.2); }

  .beacon-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }
  .beacon-stat {
    background: var(--surface);
    padding: 12px 16px;
  }
  .beacon-stat-label { font-size: 11px; color: var(--muted); font-family: var(--font-mono); margin-bottom: 4px; letter-spacing: 0.05em; }
  .beacon-stat-value { font-size: 13px; color: var(--text); font-family: var(--font-mono); font-weight: 500; }
  .beacon-stat-value.live { color: var(--accent); }

  .beacon-progress-wrap { height: 2px; background: var(--border); }
  .beacon-progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 15s linear; }

  .beacon-action {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
  }
  .pause-btn {
    flex: 1; background: none; border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-family: var(--font-mono);
    font-size: 11px; padding: 10px; cursor: pointer; letter-spacing: 0.06em;
    text-align: center; position: relative; overflow: hidden;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .pause-btn-fill {
    position: absolute; left: 0; top: 0; height: 100%; width: 0%;
    background: rgba(255,95,95,0.15); transition: none; border-radius: 8px;
  }
  .pause-btn-label { position: relative; z-index: 1; }

  /* ── ACTION TILES — same as old signals design ── */
  .action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    padding: 0 16px 8px;
  }
  .action-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; text-align: center;
    -webkit-tap-highlight-color: transparent; user-select: none;
    font-family: var(--font-mono);
  }
  .action-tile:active { background: var(--surface2); border-color: var(--accent-border); }
  .action-tile .tile-icon { font-size: 20px; }
  .action-tile .tile-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; font-weight: 600; }
  .action-tile.sending { border-color: var(--accent-border); animation: flash 0.4s; }

  /* SOS */
  .sos-wrap { padding: 0 16px 16px; }
  .sos-btn {
    width: 100%; background: rgba(255,95,95,0.06); border: 1px solid rgba(255,95,95,0.2);
    border-radius: 10px; color: var(--red); font-family: var(--font-mono);
    font-size: 13px; font-weight: 700; padding: 16px; cursor: pointer;
    letter-spacing: 0.12em; text-align: center; user-select: none;
    -webkit-tap-highlight-color: transparent; position: relative; overflow: hidden;
  }
  .sos-fill {
    position: absolute; left: 0; top: 0; height: 100%; width: 0%;
    background: rgba(255,95,95,0.15); transition: width 2s linear;
  }
  .sos-text { position: relative; z-index: 1; }
  .sos-btn.fired { background: rgba(255,95,95,0.2); }

  /* ── NOAA ── */
  .noaa-section { padding: 0 16px 24px; }
  .noaa-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .noaa-title { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .noaa-refresh { background: none; border: none; color: var(--muted); font-family: var(--font-mono); font-size: 12px; cursor: pointer; padding: 4px 8px; }
  .noaa-empty { font-size: 13px; color: var(--muted); padding: 8px 0; font-family: var(--font-mono); }
  .alert-card {
    border-left: 3px solid var(--muted); padding: 10px 12px; margin-bottom: 8px;
    background: var(--surface); border-radius: 0 8px 8px 0; cursor: pointer;
    font-size: 13px;
  }
  .alert-card.severe, .alert-card.extreme { border-left-color: var(--red); }
  .alert-card.moderate { border-left-color: #ffaa00; }
  .alert-event { color: var(--text); font-weight: 600; margin-bottom: 2px; }
  .alert-area { color: var(--muted); font-size: 11px; font-family: var(--font-mono); }
  .alert-sev { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-left: 8px; text-transform: uppercase; }

  /* ── INSTALL BAR ── */
  #signals-install-bar {
    background: var(--surface);
    border-bottom: 2px solid var(--accent-border);
    padding: 12px 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    flex-direction: column;
    gap: 10px;
  }
  #signals-ios-steps { display: none; flex-direction: column; gap: 8px; border-top: 1px solid var(--border); padding-top: 10px; font-size: 12px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%;
    transform: translateX(-50%) translateY(60px); background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 18px;
    font-size: 13px; font-family: var(--font-mono); color: var(--text);
    z-index: 999; transition: transform 0.2s, opacity 0.2s;
    opacity: 0; white-space: nowrap; pointer-events: none; letter-spacing: 0.04em;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.ok { border-color: var(--accent-border); color: var(--accent); }
  .toast.err { border-color: rgba(255,95,95,0.4); color: var(--red); }
  .toast.warn { border-color: rgba(255,170,0,0.4); color: #ffaa00; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body>

<!-- Install banner — in-flow above nav so nothing intercepts touches -->
<div id="signals-install-bar" style="display:none">
  <div style="display:flex;align-items:center;gap:12px">
    <div style="flex:1">
      <div style="font-weight:700;color:var(--accent);font-size:13px;margin-bottom:2px">Install Beacon</div>
      <div id="signals-install-desc" style="color:var(--muted)">Add to home screen for best experience</div>
    </div>
    <button id="signals-install-btn" style="background:var(--accent);color:#0a0a0b;border:none;border-radius:8px;padding:8px 16px;font-family:var(--font-mono);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.08em">INSTALL</button>
    <button id="signals-install-dismiss" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;padding:0 4px;line-height:1">×</button>
  </div>
  <div id="signals-ios-steps">
    <div style="color:var(--muted);letter-spacing:0.1em;font-size:10px">HOW TO INSTALL ON iPHONE</div>
    <div>1. Tap the <strong style="color:var(--accent)">Share</strong> button in Safari</div>
    <div>2. Tap <strong style="color:var(--accent)">"Add to Home Screen"</strong></div>
    <div>3. Tap <strong style="color:var(--accent)">"Add"</strong></div>
  </div>
</div>

<nav>
  <a href="/dashboard" class="nav-logo">
    <svg width="20" height="20" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <rect width="512" height="512" rx="80" fill="#0a0a0b"/>
      <rect x="158" y="128" width="72" height="256" rx="20" fill="#DFFF00"/>
      <rect x="282" y="128" width="72" height="256" rx="20" fill="#DFFF00"/>
    </svg>
    BEACON
  </a>
  <div class="nav-right">
    <div class="conn-dot" id="connDot"></div>
    <span class="conn-label" id="connLabel">—</span>
    <button class="lights-btn" id="lightsBtn" onclick="cycleLights()">◐ LIGHTS</button>
  </div>
</nav>

<main>
  <!-- Beacon status panel -->
  <div class="beacon-panel" id="beaconPanel">
    <div class="beacon-panel-header">
      <div class="beacon-panel-title">// Beacon</div>
      <div class="beacon-badge" id="beaconBadge">INACTIVE</div>
    </div>
    <div class="beacon-stats">
      <div class="beacon-stat">
        <div class="beacon-stat-label">DEVICE</div>
        <div class="beacon-stat-value" id="bDevice">—</div>
      </div>
      <div class="beacon-stat">
        <div class="beacon-stat-label">COUNT</div>
        <div class="beacon-stat-value" id="bCount">0</div>
      </div>
      <div class="beacon-stat">
        <div class="beacon-stat-label">LAST TX</div>
        <div class="beacon-stat-value" id="bLastTx">—</div>
      </div>
      <div class="beacon-stat">
        <div class="beacon-stat-label">NEXT TX</div>
        <div class="beacon-stat-value" id="bNextTx">—</div>
      </div>
      <div class="beacon-stat" style="grid-column:1/-1">
        <div class="beacon-stat-label">GPS</div>
        <div class="beacon-stat-value" id="bGps">acquiring…</div>
      </div>
    </div>
    <div class="beacon-progress-wrap">
      <div class="beacon-progress-fill" id="beaconProgress"></div>
    </div>
    <div class="beacon-action">
      <button class="pause-btn" id="pauseBtn">
        <div class="pause-btn-fill" id="pauseFill"></div>
        <span class="pause-btn-label" id="pauseLabel">HOLD TO PAUSE</span>
      </button>
    </div>
  </div>

  <!-- Action tiles -->
  <div class="action-grid">
    <div class="action-tile" id="tileCapture" onclick="sendCapture()">
      <div class="tile-icon">📷</div>
      <div class="tile-label">CAPTURE</div>
    </div>
    <div class="action-tile" id="tileCheckin" onclick="sendCheckin()">
      <div class="tile-icon">✅</div>
      <div class="tile-label">CHECK IN</div>
    </div>
    <div class="action-tile" id="tileNote" onclick="sendNote()">
      <div class="tile-icon">✏️</div>
      <div class="tile-label">NOTE</div>
    </div>
  </div>

  <div class="sos-wrap">
    <button class="sos-btn" id="sosBtnEl">
      <div class="sos-fill" id="sosFill"></div>
      <span class="sos-text">HOLD 2s — SOS</span>
    </button>
  </div>

  <!-- NOAA alerts -->
  <div class="noaa-section">
    <div class="noaa-header">
      <div class="noaa-title">// NOAA Alerts</div>
      <button class="noaa-refresh" onclick="loadNOAA()">↻ refresh</button>
    </div>
    <div id="noaaFeed"><div class="noaa-empty">loading…</div></div>
  </div>
</main>

<!-- Note modal -->
<div id="noteModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px;width:100%;padding-bottom:calc(20px + env(safe-area-inset-bottom))">
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:0.1em;margin-bottom:12px">// SEND NOTE</div>
    <textarea id="noteText" rows="3" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-mono);font-size:13px;padding:10px;resize:none;" placeholder="Field note…"></textarea>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button onclick="closeNote()" style="flex:1;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--font-mono);font-size:12px;padding:10px;cursor:pointer">CANCEL</button>
      <button onclick="submitNote()" style="flex:2;background:var(--accent);border:none;border-radius:8px;color:#0a0a0b;font-family:var(--font-mono);font-size:12px;font-weight:700;padding:10px;cursor:pointer">SEND</button>
    </div>
  </div>
</div>

<input type="file" id="captureInput" accept="image/*" capture="environment" style="display:none" onchange="uploadCapture(this)">
<div id="toastEl" class="toast"></div>

<script>
// ── Lights (same cycle as dashboard) ──
const LIGHTS_CYCLE = ['on', 'nite', 'nvg'];
let _lights = localStorage.getItem('beacon-lights') || 'on';
function applyLights() {
  document.documentElement.setAttribute('data-lights', _lights);
  document.getElementById('lightsBtn').textContent = { on: '◐ LIGHTS', nite: '🔴 NITE', nvg: '🟢 NVG' }[_lights] || '◐ LIGHTS';
}
function cycleLights() {
  _lights = LIGHTS_CYCLE[(LIGHTS_CYCLE.indexOf(_lights) + 1) % LIGHTS_CYCLE.length];
  localStorage.setItem('beacon-lights', _lights);
  applyLights();
}
applyLights();

// ── Auth — redirect if not logged in ──
let _me = null;
(async () => {
  try {
    const r = await fetch('/v1/auth/me', { credentials: 'include' });
    if (!r.ok) { window.location.replace('/login?next=/signals'); return; }
    _me = (await r.json());
    setConn(true, _me.name || _me.email || 'online');
    document.getElementById('bDevice').textContent = deviceId();
    startLocationWatch();
    startBeacon();
    loadNOAA();
  } catch {
    setConn(false, 'offline');
  }
})();

// ── Conn ──
function setConn(live, text) {
  document.getElementById('connDot').className = 'conn-dot' + (live ? ' live' : '');
  document.getElementById('connLabel').textContent = text;
}

// ── Toast ──
let _toastT;
function toast(msg, type = 'ok', ms = 2500) {
  const t = document.getElementById('toastEl');
  t.textContent = msg; t.className = 'toast show ' + type;
  clearTimeout(_toastT); _toastT = setTimeout(() => t.classList.remove('show'), ms);
}

// ── Device ID ──
function deviceId() {
  let id = localStorage.getItem('signals_device_id');
  if (!id) { id = 'DEV-' + Math.random().toString(36).slice(2,8).toUpperCase(); localStorage.setItem('signals_device_id', id); }
  return id;
}

// ── Location ──
let _lastPos = null;
function startLocationWatch() {
  if (!navigator.geolocation) { document.getElementById('bGps').textContent = 'unavailable'; return; }
  navigator.geolocation.watchPosition(pos => {
    _lastPos = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy };
    document.getElementById('bGps').textContent =
      `${_lastPos.lat.toFixed(5)}, ${_lastPos.lng.toFixed(5)} ±${Math.round(_lastPos.acc)}m`;
  }, () => {
    document.getElementById('bGps').textContent = 'denied';
  }, { enableHighAccuracy: true, maximumAge: 10000 });
}

// ── Signal helper ──
async function postSignal(payload) {
  const body = JSON.stringify({
    device_id: deviceId(),
    source: 'phone',
    lat: _lastPos?.lat ?? null,
    lng: _lastPos?.lng ?? null,
    accuracy: _lastPos?.acc ?? null,
    ...payload,
  });
  const r = await fetch('/v1/signals', {
    method: 'POST',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body,
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// ── Beacon ──
let _beaconActive = false, _beaconCount = 0, _beaconInterval = null, _nextTxSecs = 0;

function startBeacon() {
  if (_beaconActive) return;
  _beaconActive = true;
  localStorage.setItem('signals_beacon', '1');
  document.getElementById('beaconPanel').classList.add('active');
  document.getElementById('beaconBadge').className = 'beacon-badge active';
  document.getElementById('beaconBadge').textContent = 'ACTIVE';
  document.getElementById('pauseLabel').textContent = 'HOLD TO PAUSE';
  pingBeacon();
  _beaconInterval = setInterval(pingBeacon, 15000);
  requestWakeLock();
}

function pauseBeacon() {
  if (!_beaconActive) return;
  _beaconActive = false;
  localStorage.removeItem('signals_beacon');
  clearInterval(_beaconInterval); _beaconInterval = null;
  document.getElementById('beaconPanel').classList.remove('active');
  document.getElementById('beaconBadge').className = 'beacon-badge paused';
  document.getElementById('beaconBadge').textContent = 'PAUSED';
  document.getElementById('bNextTx').textContent = '—';
  document.getElementById('beaconProgress').style.transition = 'none';
  document.getElementById('beaconProgress').style.width = '0%';
  document.getElementById('pauseLabel').textContent = 'TAP TO RESUME';
  // sendBeacon fires even as page closes — guaranteed delivery
  navigator.sendBeacon('/v1/signals', new Blob([JSON.stringify({
    type: 'beacon_off', source: 'phone', device_id: deviceId(),
  })], { type: 'application/json' }));
  toast('Beacon paused', 'warn');
}

async function pingBeacon() {
  try {
    await postSignal({ type: 'beacon' });
    _beaconCount++;
    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const val = document.getElementById('bLastTx');
    val.textContent = now; val.className = 'beacon-stat-value live';
    setTimeout(() => { val.className = 'beacon-stat-value'; }, 3000);
    document.getElementById('bCount').textContent = _beaconCount;
    startCountdown();
  } catch {
    document.getElementById('bLastTx').textContent = 'FAILED';
  }
}

let _cdInterval = null;
function startCountdown() {
  const bar = document.getElementById('beaconProgress');
  bar.style.transition = 'none'; bar.style.width = '0%';
  requestAnimationFrame(() => { bar.style.transition = 'width 15s linear'; bar.style.width = '100%'; });
  clearInterval(_cdInterval); _nextTxSecs = 15;
  document.getElementById('bNextTx').textContent = '15s';
  _cdInterval = setInterval(() => {
    _nextTxSecs--;
    document.getElementById('bNextTx').textContent = _nextTxSecs > 0 ? `${_nextTxSecs}s` : 'now';
    if (_nextTxSecs <= 0) clearInterval(_cdInterval);
  }, 1000);
}

// Hold-to-pause button
const _pauseBtn = document.getElementById('pauseBtn');
let _pauseTimer = null;
_pauseBtn.addEventListener('pointerdown', () => {
  if (!_beaconActive) { startBeacon(); return; }
  const fill = document.getElementById('pauseFill');
  fill.style.transition = 'none'; fill.style.width = '0%';
  requestAnimationFrame(() => { fill.style.transition = 'width 1.5s linear'; fill.style.width = '100%'; });
  _pauseTimer = setTimeout(() => { pauseBeacon(); fill.style.transition='none'; fill.style.width='0%'; }, 1500);
});
['pointerup','pointerleave','pointercancel'].forEach(ev => _pauseBtn.addEventListener(ev, () => {
  if (_pauseTimer) { clearTimeout(_pauseTimer); _pauseTimer = null; }
  const fill = document.getElementById('pauseFill');
  fill.style.transition = 'none'; fill.style.width = '0%';
}));
_pauseBtn.addEventListener('contextmenu', e => e.preventDefault());

// Send beacon_off via sendBeacon on page close — works even when tab is killed
function sendOffline() {
  if (!_beaconActive) return;
  navigator.sendBeacon('/v1/signals', new Blob([JSON.stringify({
    type: 'beacon_off', source: 'phone', device_id: deviceId(),
  })], { type: 'application/json' }));
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') sendOffline();
  if (document.visibilityState === 'visible' && _beaconActive) requestWakeLock();
});
window.addEventListener('pagehide', sendOffline);

// ── SOS ──
const _sosBtn = document.getElementById('sosBtnEl');
let _sosTimer = null;
_sosBtn.addEventListener('pointerdown', () => {
  const fill = document.getElementById('sosFill');
  fill.style.transition = 'none'; fill.style.width = '0%';
  requestAnimationFrame(() => { fill.style.transition = 'width 2s linear'; fill.style.width = '100%'; });
  _sosTimer = setTimeout(async () => {
    _sosTimer = null; _sosBtn.classList.add('fired');
    try {
      await postSignal({ type: 'sos', severity: 'critical' });
      toast('SOS SENT', 'err', 8000);
    } catch { toast('SOS FAILED', 'err'); }
    setTimeout(() => { _sosBtn.classList.remove('fired'); fill.style.transition='none'; fill.style.width='0%'; }, 3000);
  }, 2000);
});
['pointerup','pointerleave','pointercancel'].forEach(ev => _sosBtn.addEventListener(ev, () => {
  if (_sosTimer) { clearTimeout(_sosTimer); _sosTimer = null; }
  const fill = document.getElementById('sosFill');
  fill.style.transition = 'none'; fill.style.width = '0%';
}));
_sosBtn.addEventListener('contextmenu', e => e.preventDefault());

// ── Capture ──
function sendCapture() { document.getElementById('captureInput').click(); }
async function uploadCapture(input) {
  const file = input.files[0]; if (!file) return;
  const tile = document.getElementById('tileCapture');
  tile.classList.add('sending');
  toast('Uploading…', 'warn', 15000);
  try {
    const buf = await file.arrayBuffer();
    const mime = file.type || 'image/jpeg';
    const uploadRes = await fetch('/v1/upload/capture', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': mime },
      body: buf,
    });
    if (!uploadRes.ok) throw new Error('upload ' + uploadRes.status);
    const { url } = await uploadRes.json();
    await postSignal({ type: 'capture', url });
    toast('Capture sent', 'ok');
  } catch (e) {
    console.error('capture error', e);
    toast('Capture failed', 'err');
  }
  tile.classList.remove('sending');
  input.value = '';
}

// ── Check-in ──
async function sendCheckin() {
  const tile = document.getElementById('tileCheckin');
  tile.classList.add('sending');
  try {
    await postSignal({ type: 'status_ok' });
    toast('Check-in sent', 'ok');
  } catch { toast('Check-in failed', 'err'); }
  setTimeout(() => tile.classList.remove('sending'), 600);
}

// ── Note ──
function sendNote() { document.getElementById('noteModal').style.display = 'flex'; document.getElementById('noteText').focus(); }
function closeNote() { document.getElementById('noteModal').style.display = 'none'; document.getElementById('noteText').value = ''; }
async function submitNote() {
  const text = document.getElementById('noteText').value.trim();
  if (!text) return;
  closeNote();
  try {
    await postSignal({ type: 'note', note: text });
    toast('Note sent', 'ok');
  } catch { toast('Note failed', 'err'); }
}

// ── NOAA ──
async function loadNOAA() {
  const feed = document.getElementById('noaaFeed');
  feed.innerHTML = '<div class="noaa-empty">loading…</div>';
  try {
    let url = 'https://api.weather.gov/alerts/active?status=actual&limit=10';
    if (_lastPos) url = `https://api.weather.gov/alerts/active?point=${_lastPos.lat.toFixed(4)},${_lastPos.lng.toFixed(4)}&status=actual&limit=10`;
    const res = await fetch(url, { headers: { 'User-Agent': 'SchedKit-Beacon/1.0 (ceo@schedkit.net)' } });
    const { features = [] } = await res.json();
    if (!features.length) { feed.innerHTML = '<div class="noaa-empty">✓ No active alerts</div>'; return; }
    feed.innerHTML = features.map(a => {
      const p = a.properties;
      const sev = (p.severity || 'minor').toLowerCase();
      const area = (p.areaDesc || '').split(';')[0].trim();
      return `<div class="alert-card ${sev}" onclick='injectNOAA(${JSON.stringify(JSON.stringify({ event: p.event, headline: p.headline, areaDesc: p.areaDesc, severity: p.severity, onset: p.onset, expires: p.expires, id: p.id }))})'>
        <div class="alert-event">${p.event || 'Weather Alert'}<span class="alert-sev">[${sev}]</span></div>
        <div class="alert-area">${area}</div>
      </div>`;
    }).join('');
  } catch { feed.innerHTML = '<div class="noaa-empty">× Could not load alerts</div>'; }
}

async function injectNOAA(json) {
  const p = JSON.parse(json);
  try {
    await postSignal({ type: 'noaa_alert', severity: (p.severity||'minor').toLowerCase(), title: p.event, description: p.headline, area: p.areaDesc, onset: p.onset, expires: p.expires, noaa_id: p.id });
    toast('Alert → war room', 'ok');
  } catch { toast('Failed', 'err'); }
}

// ── Wake Lock ──
let _wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { _wakeLock = await navigator.wakeLock.request('screen'); } catch {}
}

// ── PWA install ──
let _deferredInstall = null;
const isIos = () => /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = () => window.matchMedia('(display-mode:standalone)').matches || navigator.standalone === true;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); _deferredInstall = e;
  if (!isStandalone() && !localStorage.getItem('signals-install-dismissed')) showInstallBar();
});
window.addEventListener('load', () => {
  if (isIos() && !isStandalone() && !localStorage.getItem('signals-install-dismissed')) showInstallBar(true);
});
function showInstallBar(ios = false) {
  const bar = document.getElementById('signals-install-bar');
  bar.style.display = 'flex';
  if (ios) { document.getElementById('signals-install-btn').textContent = 'HOW TO INSTALL'; }
}
function hideInstallBar() {
  document.getElementById('signals-install-bar').style.display = 'none';
  localStorage.setItem('signals-install-dismissed', '1');
}
async function handleInstall() {
  if (isIos() || !_deferredInstall) {
    document.getElementById('signals-ios-steps').style.display = 'flex';
    document.getElementById('signals-install-btn').style.display = 'none';
    return;
  }
  _deferredInstall.prompt();
  await _deferredInstall.userChoice;
  _deferredInstall = null;
  hideInstallBar();
}
document.getElementById('signals-install-btn').addEventListener('touchend', e => { e.preventDefault(); handleInstall(); });
document.getElementById('signals-install-btn').addEventListener('click', handleInstall);
document.getElementById('signals-install-dismiss').addEventListener('touchend', e => { e.preventDefault(); hideInstallBar(); });
document.getElementById('signals-install-dismiss').addEventListener('click', hideInstallBar);
</script>
